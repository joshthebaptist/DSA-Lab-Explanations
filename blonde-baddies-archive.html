const GoldParticles=()=>{
const[particles]=useState(()=>Array.from({length:30},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,size:Math.random()*3+1,duration:Math.random()*3+2,delay:Math.random()*5})));

<motion.div key={p.id} className="absolute rounded-full" style={{left:`${p.x}%`,top:`${p.y}%`,width:p.size,height:p.size,background:`radial-gradient(circle,#FFD700,#D4AF37)`}}

))}</div>);
};

const Navbar=()=>{

const[section,setSection]=useState('hero');

return(<motion.nav initial={{y:-100}} animate={{y:0}} transition={{duration:0.8,ease:[0.23,1,0.32,1]}}
className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled?'nav-scrolled py-3':'py-5'}`}>

</div></motion.nav>);
};
